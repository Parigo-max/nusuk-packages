<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nusuk Packages Explorer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root {
    --primary: #633448;
    --background: #F5F8F9;
    --card-bg: #ffffff;
    --border: #e5e7eb;
    --row-alt: #f3e9ec;
    --accent: #D9BE82;
}

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: var(--background);
}

.container {
    max-width: 1600px;
    margin: auto;
    padding: 20px;
}

.page-title {
    background: var(--primary);
    color: white;
    padding: 16px;
    text-align: center;
    font-size: 24px;
    border-radius: 12px;
}

.update-info {
    text-align: center;
    margin: 15px 0;
    font-weight: 600;
}

.card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: var(--primary);
    color: white;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
}

tbody tr:nth-child(even) {
    background-color: var(--row-alt);
}

/* ===== DATE FIX ===== */
th:nth-child(8),
th:nth-child(9),
td:nth-child(8),
td:nth-child(9) {
    white-space: nowrap;
    text-align: center;
    font-size: 13px;
}

/* ===== DESKTOP OPTIM ===== */
@media (min-width: 769px) {

    th:nth-child(1), td:nth-child(1) { width: 18%; }
    th:nth-child(2), td:nth-child(2) { width: 10%; }
    th:nth-child(3), td:nth-child(3) { width: 6%; text-align:center; }

    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6) { width: 14%; }

    th:nth-child(7), td:nth-child(7) { width: 12%; }

    td {
        padding: 14px 10px;
    }

    .price-main {
        font-weight: 700;
        display: block;
    }

    .price-eur {
        font-size: 12px;
        color: #666;
    }

    .btn {
        padding: 8px 12px;
        font-size: 13px;
        border-radius: 8px;
    }

    tbody tr:nth-child(even) {
        background-color: #eee3e7;
    }
}

/* BUTTON */
.btn {
    background: var(--accent);
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}

/* MOBILE */
.mobile-cards { display: none; }

@media (max-width: 768px) {
    table { display: none; }
    .mobile-cards { display: block; }
}
</style>
</head>

<body>

<div class="container">
<div class="page-title">Nusuk Packages Explorer</div>
<div class="update-info" id="lastUpdate">Chargement...</div>

<div class="card">
<table id="packagesTable">
<thead>
<tr>
<th>Name</th>
<th>Category</th>
<th>Duration</th>
<th>Makkah Hotel 1</th>
<th>Makkah Hotel 2</th>
<th>Madinah Hotel</th>
<th>Total Price</th>
<th>Start Date</th>
<th>End Date</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="mobileCards" class="mobile-cards"></div>
</div>
</div>

<script>
const EXCEL_URL = "https://raw.githubusercontent.com/parigo-max/nusuk-packages/main/result.xlsx";
const API = "https://api.github.com/repos/parigo-max/nusuk-packages/commits?path=result.xlsx&page=1&per_page=1";

let data = [];
let rate = 0.25;

/* RATE */
async function getRate(){
    try{
        let r=await fetch("https://api.exchangerate.host/latest?base=SAR&symbols=EUR");
        let d=await r.json();
        if(d?.rates?.EUR) rate=d.rates.EUR;
    }catch{}
}

/* DATE */
async function getDate(){
    try{
        let r=await fetch(API);
        let d=await r.json();
        document.getElementById("lastUpdate").innerText =
            "Dernière mise à jour : " +
            new Date(d[0].commit.committer.date).toLocaleString("fr-FR");
    }catch{
        document.getElementById("lastUpdate").innerText =
            new Date().toLocaleString("fr-FR");
    }
}

/* FORMAT */
function price(v){
    let n=Number(v);
    if(isNaN(n)) return "";
    return `<span class="price-main">${n.toLocaleString()} SAR</span>
            <span class="price-eur">(${(n*rate).toLocaleString()} €)</span>`;
}

function date(d){
    let x=new Date(d);
    return isNaN(x)?d:x.toLocaleDateString("fr-FR");
}

/* RENDER */
function render(){
    let t=document.querySelector("#packagesTable tbody");
    let m=document.getElementById("mobileCards");
    t.innerHTML=""; m.innerHTML="";

    data.forEach(p=>{
        t.innerHTML+=`
        <tr>
            <td>${p.nameEn}</td>
            <td>${p.packageCategoryName}</td>
            <td>${p.packageDurationDays}</td>
            <td>${p.Makkah_Hotel_1||""}</td>
            <td>${p.Makkah_Hotel_2||""}</td>
            <td>${p.Madinah_Hotel_1||""}</td>
            <td>${price(p.totalPrice)}</td>
            <td>${date(p.startDate)}</td>
            <td>${date(p.endDate)}</td>
            <td><button class="btn" onclick="navigator.clipboard.writeText('${p['Lien summary']}')">Copier</button></td>
        </tr>`;

        m.innerHTML+=`
        <div class="card">
            <strong>${p.nameEn}</strong><br>
            ${price(p.totalPrice)}<br>
            <button class="btn" onclick="navigator.clipboard.writeText('${p['Lien summary']}')">Copier</button>
        </div>`;
    });
}

/* LOAD */
async function load(){
    let r=await fetch(EXCEL_URL);
    let b=await r.arrayBuffer();
    let wb=XLSX.read(new Uint8Array(b),{type:"array"});
    data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    render();
}

/* INIT */
window.onload=async()=>{
    await getRate();
    await load();
    await getDate();
};
</script>

</body>
</html>
