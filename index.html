<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nusuk Packages Explorer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --primary:#633448;
  --accent:#D9BE82;
  --bg:#F5F8F9;
  --card:#fff;
  --text:#1f2937;
  --border:#e5e7eb;
}
body{font-family:Inter;margin:0;background:var(--bg);color:var(--text)}
.container{max-width:1500px;margin:auto;padding:20px}

.page-title{background:var(--primary);color:#fff;padding:14px;text-align:center;border-radius:10px}
.update-info{text-align:center;margin:10px 0;font-size:13px}

.card{background:var(--card);padding:16px;border-radius:10px;margin-bottom:16px}

.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.filter-group{border:1px solid var(--border);border-radius:8px;padding:8px;max-height:220px;overflow:auto;background:#fafafa}
.filter-group label{display:block;font-size:13px}

.result-count{text-align:center;font-weight:600;margin-bottom:10px}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;font-size:13px;border-bottom:1px solid #ddd;text-align:left}
thead{background:var(--primary);color:#fff}

.btn{background:var(--accent);border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-weight:600}

.favorite{cursor:pointer;font-size:18px}
.favorite.active{color:gold}

.nowrap{white-space:nowrap}

.mobile{display:none}
.card-item{border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:10px}

.top-actions{
  display:flex;
  justify-content:center;
  margin-bottom:10px;
}

@media(max-width:768px){
  table{display:none}
  .mobile{display:block}
}
</style>
</head>

<body>

<div class="container">

<div class="page-title">Nusuk Packages Explorer</div>
<div class="update-info" id="update"></div>

<div class="top-actions">
<button class="btn" id="toggleFavorites">Afficher favoris uniquement</button>
</div>

<div class="result-count">
Résultats : <span id="count">0</span>
</div>

<div class="card">

<table id="table">
<thead>
<tr>
<th>⭐</th>
<th>Name</th>
<th>Category</th>
<th>Duration</th>
<th>Makkah Hotel 1</th>
<th>Makkah Hotel 2</th>
<th>Madinah Hotel</th>
<th>Price</th>
<th>Dates</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="mobile" class="mobile"></div>

</div>

</div>

<script>

const EXCEL_URL="https://raw.githubusercontent.com/parigo-max/nusuk-packages/main/result.xlsx";

let allData=[];
let showFavoritesOnly=false;

/* FAVORIS */
function getFavorites(){
  return JSON.parse(localStorage.getItem("favorites")||"[]");
}

function toggleFavorite(id){
  let favs=getFavorites();

  if(favs.includes(id)){
    favs=favs.filter(x=>x!==id);
  }else{
    favs.push(id);
  }

  localStorage.setItem("favorites",JSON.stringify(favs));
  applyFilters();
}

/* PRICE */
function priceHTML(v){
 const sar=Number(v)||0;
 return `${sar.toLocaleString('fr-FR')} SAR`;
}

function formatDate(d){
 const dt=new Date(d);
 return isNaN(dt)?"":dt.toLocaleDateString('fr-FR');
}

/* FILTER */
function applyFilters(){

 let data=[...allData];

 if(showFavoritesOnly){
   const favs=getFavorites();
   data=data.filter(p=>favs.includes(p.uuid));
 }

 render(data);
 document.getElementById('count').textContent=data.length;
}

/* RENDER */
function render(data){

 const favs=getFavorites();
 const tbody=document.querySelector("#table tbody");
 const mobile=document.getElementById("mobile");

 tbody.innerHTML="";
 mobile.innerHTML="";

 data.forEach(p=>{

 const isFav=favs.includes(p.uuid);

 tbody.innerHTML+=`
<tr>
<td><span class="favorite ${isFav?'active':''}" onclick="toggleFavorite('${p.uuid}')">★</span></td>
<td>${p.nameEn||""}</td>
<td>${p.packageCategoryName||""}</td>
<td>${p.packageDurationDays||""}</td>
<td>${p.Makkah_Hotel_1||""}</td>
<td>${p.Makkah_Hotel_2||""}</td>
<td>${p.Madinah_Hotel_1||""}</td>
<td>${priceHTML(p.totalPrice)}</td>
<td class="nowrap">${formatDate(p.startDate)} → ${formatDate(p.endDate)}</td>
<td><button class="btn" onclick="navigator.clipboard.writeText('${p['Lien summary']}')">Copier</button></td>
</tr>`;

 mobile.innerHTML+=`
<div class="card-item">
<span class="favorite ${isFav?'active':''}" onclick="toggleFavorite('${p.uuid}')">★</span>
<b>${p.nameEn||""}</b><br>
${p.packageCategoryName||""} • ${p.packageDurationDays||""} jours<br>

<div><b>Makkah 1:</b> ${p.Makkah_Hotel_1||""}</div>
<div><b>Makkah 2:</b> ${p.Makkah_Hotel_2||""}</div>
<div><b>Madinah:</b> ${p.Madinah_Hotel_1||""}</div>

${priceHTML(p.totalPrice)}

<div class="nowrap">${formatDate(p.startDate)} → ${formatDate(p.endDate)}</div>

<button class="btn" onclick="navigator.clipboard.writeText('${p['Lien summary']}')">
Copier lien
</button>
</div>`;
 });
}

/* LOAD */
async function load(){

 const r=await fetch(EXCEL_URL);
 const b=await r.arrayBuffer();

 const wb=XLSX.read(new Uint8Array(b),{type:'array'});
 allData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});

 applyFilters();
}

document.getElementById("toggleFavorites").addEventListener("click",()=>{
 showFavoritesOnly=!showFavoritesOnly;
 applyFilters();
});

load();

</script>

</body>
</html>
