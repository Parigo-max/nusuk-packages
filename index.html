<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nusuk Packages Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{--primary:#633448;--accent:#D9BE82;--bg:#F5F8F9;--card:#fff;--text:#1f2937;--border:#e5e7eb}
body{font-family:Inter;margin:0;background:var(--bg);color:var(--text)}
.container{max-width:1500px;margin:auto;padding:20px}
.page-title{background:var(--primary);color:#fff;padding:14px;text-align:center;border-radius:10px}
.update-info{text-align:center;margin:10px 0;font-size:13px}
.card{background:var(--card);padding:16px;border-radius:10px;margin-bottom:16px}

.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.filter-group{border:1px solid var(--border);border-radius:8px;padding:8px;max-height:220px;overflow:auto;background:#fafafa}
.filter-group label{display:block;font-size:13px}
.select-all{font-weight:600;margin-bottom:6px}

.result-count{text-align:center;font-weight:600;margin-bottom:10px}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;font-size:13px;border-bottom:1px solid #ddd;text-align:left}
thead{background:var(--primary);color:#fff}

.price{font-weight:600}
.price small{display:block;font-weight:400;color:#555}

.btn{background:var(--accent);border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:600}

.mobile{display:none}
.card-item{border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:10px}

.nowrap{white-space:nowrap}

@media(max-width:768px){table{display:none}.mobile{display:block}.filters{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="container">
<div class="page-title">Nusuk Packages Explorer</div>
<div class="update-info" id="update"></div>

<div class="card">
<div class="filters">
<div class="filter-group">
<b>Category</b>
<label class="select-all"><input type="checkbox" id="allCategory"> Tout sélectionner</label>
<div id="categoryFilter"></div>
</div>

<div class="filter-group">
<b>Duration</b>
<label class="select-all"><input type="checkbox" id="allDuration"> Tout sélectionner</label>
<div id="durationFilter"></div>
</div>

<div class="filter-group">
<b>Ordre</b>
<label class="select-all"><input type="checkbox" id="allOrder"> Tout sélectionner</label>
<div id="orderFilter"></div>
</div>

<div class="filter-group">
<b>Disponible</b>
<label class="select-all"><input type="checkbox" id="allDispo"> Tout sélectionner</label>
<label><input type="checkbox" value="oui"> oui</label>
<label><input type="checkbox" value="non"> non</label>
</div>
</div>
</div>

<div class="result-count">Résultats : <span id="count">0</span></div>

<div class="card">
<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Category</th>
<th>Duration</th>
<th>Makkah Hotel 1</th>
<th>Makkah Hotel 2</th>
<th>Madinah Hotel</th>
<th>Price</th>
<th>Dates</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="mobile" class="mobile"></div>
</div>
</div>

<script>
const EXCEL_URL="https://raw.githubusercontent.com/parigo-max/nusuk-packages/main/result.xlsx";
const REPO_API="https://api.github.com/repos/parigo-max/nusuk-packages/commits/main";
let allData=[];let rate=0;

async function fetchRate(){try{const r=await fetch("https://api.exchangerate.host/latest?base=SAR&symbols=EUR");const j=await r.json();rate=j.rates.EUR}catch{rate=0.25}}
function priceHTML(v){const sar=Number(v)||0;const eur=rate?(sar*rate).toFixed(0):"";return `<div class='price'>${sar.toLocaleString('fr-FR')} SAR<small>${eur} €</small></div>`}
function formatDate(d){const dt=new Date(d);return isNaN(dt)?"":dt.toLocaleDateString('fr-FR')}

async function fetchUpdate(){
 try{
  // récupération des métadonnées du fichier result.xlsx
  const r=await fetch("https://api.github.com/repos/parigo-max/nusuk-packages/contents/result.xlsx");
  const j=await r.json();

  if(j && j.sha){
    // récupérer le dernier commit lié à ce fichier
    const commitRes = await fetch(`https://api.github.com/repos/parigo-max/nusuk-packages/commits?path=result.xlsx&per_page=1`);
    const commitData = await commitRes.json();

    if(commitData && commitData[0]){
      const date = commitData[0].commit.committer.date;
      document.getElementById("update").textContent =
        "Dernière mise à jour : " + new Date(date).toLocaleString('fr-FR');
      return;
    }
  }

  throw new Error("fallback");
 }catch{
  document.getElementById("update").textContent="Mise à jour récente";
 }
}catch{document.getElementById("update").textContent="Mise à jour récente"}}

function getValues(selector){return Array.from(document.querySelectorAll(selector+" input:checked")).map(cb=>cb.value)}

function bindSelectAll(allId, containerId){
 document.getElementById(allId).addEventListener('change',function(){
  document.querySelectorAll(`#${containerId} input`).forEach(cb=>cb.checked=this.checked);
  applyFilters();
 });
}

function initFilters(){
 createFilter('categoryFilter','packageCategoryName');
 createFilter('durationFilter','packageDurationDays');
 createFilter('orderFilter','Ordre_Voyage');

 bindSelectAll('allCategory','categoryFilter');
 bindSelectAll('allDuration','durationFilter');
 bindSelectAll('allOrder','orderFilter');

 document.getElementById('allDispo').addEventListener('change',function(){
  document.querySelectorAll('.filter-group:nth-child(4) input[type=checkbox]').forEach(cb=>cb.checked=this.checked);
  applyFilters();
 });

 document.querySelectorAll('.filter-group input').forEach(cb=>cb.addEventListener('change',applyFilters));
}

function createFilter(id,field){
 const el=document.getElementById(id);
 const vals=[...new Set(allData.map(x=>x[field]).filter(Boolean))].sort();
 vals.forEach(v=>{el.innerHTML+=`<label><input type='checkbox' value="${v}"> ${v}</label>`})
}

function applyFilters(){
 const cat=getValues('#categoryFilter');
 const dur=getValues('#durationFilter');
 const ord=getValues('#orderFilter');
 const dispo=getValues('.filter-group:nth-child(4)');

 const filtered=allData.filter(p=>
 (cat.length===0||cat.includes(String(p.packageCategoryName)))&&
 (dur.length===0||dur.includes(String(p.packageDurationDays)))&&
 (ord.length===0||ord.includes(String(p.Ordre_Voyage)))&&
 (dispo.length===0||dispo.includes(String(p.Disponible)))
 );

 render(filtered);
 document.getElementById('count').textContent=filtered.length;
}

function render(data){
 const tbody=document.querySelector("#table tbody");
 const mobile=document.getElementById("mobile");
 tbody.innerHTML="";mobile.innerHTML="";

 data.forEach(p=>{
 tbody.innerHTML+=`<tr>
<td>${p.nameEn||""}</td>
<td>${p.packageCategoryName||""}</td>
<td>${p.packageDurationDays||""}</td>
<td>${p.Makkah_Hotel_1||""}</td>
<td>${p.Makkah_Hotel_2||""}</td>
<td>${p.Madinah_Hotel_1||""}</td>
<td>${priceHTML(p.totalPrice)}</td>
<td class="nowrap">${formatDate(p.startDate)} → ${formatDate(p.endDate)}</td>
<td><button class='btn' onclick="navigator.clipboard.writeText('${p['Lien summary']}')">Copier</button></td>
</tr>`;

 mobile.innerHTML+=`<div class='card-item'>
<b>${p.nameEn||""}</b><br>
${p.packageCategoryName||""} • ${p.packageDurationDays||""} jours<br>
<div><b>Makkah 1:</b> ${p.Makkah_Hotel_1||""}</div>
<div><b>Makkah 2:</b> ${p.Makkah_Hotel_2||""}</div>
<div><b>Madinah:</b> ${p.Madinah_Hotel_1||""}</div>
${priceHTML(p.totalPrice)}
<div class="nowrap">${formatDate(p.startDate)} → ${formatDate(p.endDate)}</div>
<button class='btn' onclick="navigator.clipboard.writeText('${p['Lien summary']}')">Copier lien</button>
</div>`;
 });
}

async function load(){
 await fetchRate();
 await fetchUpdate();
 const r=await fetch(EXCEL_URL);
 const b=await r.arrayBuffer();
 const wb=XLSX.read(new Uint8Array(b),{type:'array'});
 allData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
 initFilters();
 applyFilters();
}

load();
</script>

</body>
</html>
