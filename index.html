<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nusuk Packages Explorer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --primary:#633448;
  --accent:#D9BE82;
  --bg:#F5F8F9;
}
body{font-family:Inter;margin:0;background:var(--bg)}
.container{max-width:1500px;margin:auto;padding:20px}

.page-title{background:var(--primary);color:#fff;padding:14px;text-align:center;border-radius:10px}

.btn{background:var(--accent);border:none;padding:6px 10px;border-radius:6px;cursor:pointer}

.favorite{cursor:pointer;font-size:18px}
.favorite.active{color:gold}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}

.nowrap{white-space:nowrap}
</style>
</head>

<body>

<div class="container">

<div class="page-title">Nusuk Packages Explorer</div>

<div style="margin:10px 0;text-align:center">
<button class="btn" id="toggleFavorites">Afficher favoris</button>
<button class="btn" id="exportFavorites">Exporter favoris</button>
</div>

<table id="table">
<thead>
<tr>
<th>⭐</th>
<th>Name</th>
<th>Price</th>
<th>Dates</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

let allData=[];
let showFavoritesOnly=false;

/* ===== FAVORIS ===== */
function getFavorites(){
 return JSON.parse(localStorage.getItem("favorites")||"[]");
}

function toggleFavorite(id){
 let favs=getFavorites();

 if(favs.includes(id)){
  favs=favs.filter(x=>x!==id);
 }else{
  favs.push(id);
 }

 localStorage.setItem("favorites",JSON.stringify(favs));
 render(allData);
}

/* ===== EXPORT ===== */
function exportFavorites(){

 const favs=getFavorites();
 const data=allData.filter(p=>favs.includes(p.uuid));

 if(data.length===0){
  alert("Aucun favori");
  return;
 }

 const ws=XLSX.utils.json_to_sheet(data);
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Favoris");

 XLSX.writeFile(wb,"favoris.xlsx");
}

/* ===== RENDER ===== */
function render(data){

 const favs=getFavorites();
 const tbody=document.querySelector("#table tbody");
 tbody.innerHTML="";

 data.forEach(p=>{

 const isFav=favs.includes(p.uuid);

 tbody.innerHTML+=`
<tr>
<td>
<span class="favorite ${isFav?'active':''}" onclick="toggleFavorite('${p.uuid}')">
${isFav ? '★' : ''}
</span>
</td>
<td>${p.nameEn}</td>
<td>${Number(p.totalPrice).toLocaleString()} SAR</td>
<td class="nowrap">${p.startDate} → ${p.endDate}</td>
</tr>`;
 });
}

/* ===== LOAD ===== */
async function load(){

 const r=await fetch("https://raw.githubusercontent.com/parigo-max/nusuk-packages/main/result.xlsx");
 const b=await r.arrayBuffer();

 const wb=XLSX.read(new Uint8Array(b),{type:'array'});
 allData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

 render(allData);
}

document.getElementById("toggleFavorites").onclick=()=>{
 showFavoritesOnly=!showFavoritesOnly;

 if(showFavoritesOnly){
  const favs=getFavorites();
  render(allData.filter(p=>favs.includes(p.uuid)));
 }else{
  render(allData);
 }
};

document.getElementById("exportFavorites").onclick=exportFavorites;

load();

</script>

</body>
</html>
